name: Lint

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint-python:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies (dev)
        run: uv sync --extra dev

      - name: Ruff — check format
        run: uv run ruff format --check .

      - name: Ruff — lint
        run: uv run ruff check .

  lint-markdown:
    name: PyMarkdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install pymarkdownlnt
        run: uv tool install pymarkdownlnt

      - name: Scan Markdown files
        run: uv run pymarkdownlnt scan --recurse .

  lint-yaml:
    name: yamllint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install yamllint
        run: uv tool install yamllint

      - name: Lint YAML files
        run: uv run yamllint .
