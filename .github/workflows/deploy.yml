name: Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: europe-west9-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/simplon-docker/api:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: europe-west9-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/simplon-docker/frontend:${{ github.sha }}
